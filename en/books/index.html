<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Books — Pol Grek</title>
  <meta name="description" content="Pol Grek catalog: covers, blurbs, excerpts, Amazon and LitRes." />
  <link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml" />
  <link rel="alternate" hreflang="ru" href="https://polgrek.site/books/" />
  <link rel="alternate" hreflang="en" href="https://polgrek.site/en/books/" />
  <link rel="stylesheet" href="../../css/styles.css" />
</head>
<body data-page="books" data-base=".." data-lang="en" data-assets="../..">
  <div id="site-header"></div>
  <noscript><div class="noscript-banner container">Full book catalog below — no JavaScript required.</div></noscript>
  <main>
    <section class="page-hero">
      <div class="container">
        <div class="breadcrumb"><a href="../index.html">Home</a> · <span>Books</span></div>
        <p class="eyebrow">Catalog</p>
        <h1>Books by Pol Grek</h1>
        <p class="lead">Twelve key titles here. Full author catalog — on <a href="https://www.litres.ru/author/pol-grek/" target="_blank" rel="noopener">LitRes</a> and Amazon product pages. Each card: cover, pitch, store links, excerpt.</p>
      </div>
    </section>
    <section style="padding-top:0">
      <div class="container">
        <noscript><p class="muted" style="margin-bottom:1rem">Topic filters need JavaScript. Without JS you still get all 12 books below.</p></noscript>
        <div class="filters" id="bookFilters" aria-label="Filters"></div>
        <div class="books-grid" id="booksGrid"></div>
        <p class="catalog-hint" style="margin-top:2rem">
          Twelve key titles on-site. <a href="https://www.litres.ru/author/pol-grek/" target="_blank" rel="noopener">Full list and reviews on LitRes →</a>
        </p>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="../../js/base-config.js"></script>
  <script src="../../js/data-en.js"></script>
  <script src="../../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(location.search);
      const f = params.get('filter');
      if (!f) return;
      setTimeout(() => {
        const btn = document.querySelector('.filter-btn[data-filter="' + CSS.escape(f) + '"]');
        if (btn) btn.click();
      }, 0);
    });
  </script>
</body>
</html>
