<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Books by Pol Grek — brain science catalog</title>
  <meta name="description" content="Catalog of 13 Pol Grek books: brain, stress, burnout, energy, money. Free excerpts; buy on Amazon or LitRes." />
  <link rel="canonical" href="https://polgrek.site/en/books/index.html" />
  <meta property="og:title" content="Books by Pol Grek" />
  <meta property="og:description" content="13 key titles with free excerpts. Filter by topic. Buy on Amazon or LitRes." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://polgrek.site/en/books/index.html" />
  <meta property="og:image" content="https://polgrek.site/assets/og-image.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://polgrek.site/assets/og-image.jpg" />
  <link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml" />
  <link rel="alternate" hreflang="ru" href="https://polgrek.site/books/index.html" />
  <link rel="alternate" hreflang="en" href="https://polgrek.site/en/books/index.html" />
  <link rel="alternate" hreflang="x-default" href="https://polgrek.site/books/index.html" />
  <link rel="stylesheet" href="../../css/styles.css?v=20260715seo" />
</head>
<body data-page="books" data-base=".." data-lang="en" data-assets="../..">
  <div id="site-header"></div>
  <noscript><div class="noscript-banner container">Full book catalog below — no JavaScript required. Search and filters need JS.</div></noscript>
  <main id="main-content" tabindex="-1">
    <section class="page-hero catalog-page-hero">
      <div class="container">
        <nav class="breadcrumb" aria-label="You are here"><a href="../index.html">Home</a><span class="bc-sep">/</span><span aria-current="page">Books</span></nav>
        <p class="eyebrow">Catalog</p>
        <h1>13 books by Pol Grek</h1>
        <p class="lead">Search by title or topic, filter by situation — or buy on Amazon / LitRes. Full author list on <a href="https://www.litres.ru/author/pol-grek/" target="_blank" rel="noopener">LitRes</a>.</p>
      </div>
    </section>
    <section style="padding-top:0">
      <div class="container">
        <noscript><p class="muted" style="margin-bottom:1rem">Search and topic filters need JavaScript. Without JS you still get the full list below.</p></noscript>
        <div class="catalog-toolbar">
          <div class="catalog-search-wrap">
            <label class="sr-only" for="catalogSearch">Search catalog</label>
            <input
              type="search"
              id="catalogSearch"
              class="catalog-search"
              name="q"
              placeholder="Search books…"
              autocomplete="off"
              enterkeyhint="search"
            />
            <button type="button" class="catalog-search-clear" id="catalogSearchClear" hidden aria-label="Clear search">×</button>
          </div>
          <div class="filters" id="bookFilters" aria-label="Topics"></div>
          <p class="catalog-count" id="catalogCount">Showing 13 of 13</p>
        </div>
        <div class="catalog-empty" id="catalogEmpty" hidden>
          <p data-empty-msg>No books match. Try another word or reset the topic filter.</p>
          <button type="button" class="btn btn-outline" data-catalog-reset>Show all books</button>
        </div>
        <div class="books-grid books-grid--catalog" id="booksGrid"></div>
        <p class="catalog-hint" style="margin-top:2rem">
          Thirteen key titles on-site. <a href="https://www.litres.ru/author/pol-grek/" target="_blank" rel="noopener">Full list and reviews on LitRes →</a>
        </p>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="../../js/base-config.js"></script>
  <script src="../../js/data-en.js"></script>
  <script src="../../js/main.js"></script>
  <!-- ?filter= applied in main.js renderBooksPage -->
</body>
</html>
